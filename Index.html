<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK STEM AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>DK STEM AI</h1>

    <p class="subtitle">
        Ask questions about Mathematics, Physics, and Computer Science.
    </p>

    <div class="chat-box" id="chatBox"></div>

    <textarea
        id="userInput"
        placeholder="Ask your STEM question..."
    ></textarea>

    <button id="sendBtn">
        Send
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
